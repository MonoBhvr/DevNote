<!doctype html>
<html lang="ko" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DevNote 글쓰기 화면">
  <title>글쓰기 · DevNote</title>
  <script>(()=>{try{const t=localStorage.getItem('devnote-theme')||'system';document.documentElement.dataset.theme=t}catch{document.documentElement.dataset.theme='system'}})()</script>
  <link rel="stylesheet" href="../assets/styles/colors.css">
  <link rel="stylesheet" href="../assets/styles/katex.min.css">
  <link rel="stylesheet" href="../assets/styles/global.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">MonoBhvr DevLog</a>
    <nav class="top-nav"><a href="../index.html#/projects">Projects</a><a href="../login/index.html" data-admin-login-nav>관리자 로그인</a><a href="index.html" data-write-nav hidden>글쓰기</a><label class="theme-select">Theme <select data-theme-select aria-label="색상 모드"><option value="system">System</option><option value="light">Light</option><option value="dark">Dark</option></select></label></nav>
  </header>
  <script>(()=>{const k="devnote-authoring-token:MonoBhvr/DevNote";const l=document.querySelector('[data-admin-login-nav]');const w=document.querySelector('[data-write-nav]');let ok=false;try{ok=!!localStorage.getItem(k)}catch{}if(l)l.hidden=ok;if(w)w.hidden=!ok})()</script>
  <script>(()=>{const s=document.querySelector('[data-theme-select]');if(!s)return;const apply=t=>{document.documentElement.dataset.theme=t;s.value=t;try{localStorage.setItem('devnote-theme',t)}catch{}};s.value=document.documentElement.dataset.theme||'system';s.addEventListener('change',()=>apply(s.value))})()</script>
  <main><section class="section page-title write-title"><p class="eyebrow">Authoring</p><h1>글쓰기</h1></section>
    <section class="write-auth" data-authoring-root data-authoring-mode="write">
      <section class="card write-card write-guard" data-write-guard hidden>
        <p class="status" data-auth-status></p>
      </section>
      <section class="write-workspace" data-writing-workspace hidden>
        <form class="write-editor" data-post-form data-editor-pane>
          <div class="write-session"><p class="status" data-session-status>관리자 확인 중입니다.</p><button type="button" class="button secondary-button" data-logout>로그아웃</button></div>
          <div class="write-meta-grid">
            <label>프로젝트 <select data-project></select></label>
            <label>시리즈 <select data-series></select></label>
          </div>
          <input class="write-title-input" data-title required placeholder="제목을 입력하세요">
          <input class="write-tags-input" data-tags placeholder="태그를 입력하세요">
          <div class="write-meta-grid compact">
            <label>Slug <input data-slug placeholder="비우면 제목 기반"></label>
            <label>설명 <input data-description></label>
            <label>작성일 <input type="date" data-date></label>
            <label>순서 <input type="number" data-order value="1"></label>
          </div>
          <label class="check-row"><input type="checkbox" data-draft> draft로 저장</label>
          <div class="editor-toolbar" aria-label="작성 도구"><button type="button" data-insert="heading1">H1</button><button type="button" data-insert="heading2">H2</button><button type="button" data-insert="heading3">H3</button><span></span><button type="button" data-insert="bold">B</button><button type="button" data-insert="italic">I</button><button type="button" data-insert="quote">“</button><button type="button" data-insert="link">Link</button><button type="button" data-insert="code">&lt;&gt;</button></div>
          <textarea class="write-body-input" data-content rows="22" placeholder="당신의 이야기를 적어보세요..."></textarea>
          <section class="image-panel">
            <h2>이미지 업로드</h2>
            <div class="write-meta-grid compact">
              <label>이미지 <input type="file" data-image-file accept="image/png,image/jpeg,image/webp,image/svg+xml"></label>
              <label>이름 <input data-image-name placeholder="block-diagram"></label>
            </div>
            <label class="check-row"><input type="checkbox" data-image-overwrite> 같은 이름 덮어쓰기</label>
            <button type="button" class="button secondary-button" data-upload-image>이미지 업로드</button>
            <p class="status" data-image-status></p>
          </section>
          <div class="write-actions"><a href="../index.html">← 나가기</a><button type="submit" class="button">출간하기</button></div>
          <p class="status" data-save-status></p>
        </form>
        <aside class="write-preview" data-preview-pane>
          <article class="post-content marknote-content preview-content" data-preview><p class="muted">작성한 MarkNote가 여기에 렌더링됩니다.</p></article>
        </aside>
      </section>
    </section>
    <script type="application/json" id="devnote-authoring-config">{"repo":"MonoBhvr/DevNote","branch":"main","contentRoot":"content","manifestPath":"content/manifest.json","allowedAuthors":["MonoBhvr"],"projects":[{"title":"MarkNote 개발기","slug":"marknote","series":[{"title":"문법 설계","slug":"syntax"}]}]}</script>
    <script src="../assets/scripts/authoring.js"></script></main>
</body>
</html>
